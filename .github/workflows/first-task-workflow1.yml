name: Test and Deploy
on:
  push:
    branches:
      - first_problem
jobs:
  Deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Dependancies
        run: |
          cd tasks/first-task/
          npm ci
      - name: test
        run: |
          cd tasks/first-task/
          lint test
      - name: deploy
        run: |
          cd tasks/first-task/
          lint build
    
