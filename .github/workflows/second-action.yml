name: Test npm project
on:
  push:
    branches:
      - second-workflow
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v6
      - name: get dependancies
        run: |
          cd second-action
          npm ci
      - name: run tests
        run: |
          cd second-action
          npm test
  deploy:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v6
      - name: get dependancies
        run: |
          cd second-action
          npm ci
      - name: Build Project
        run: |
          cd second-action
          npm run build
